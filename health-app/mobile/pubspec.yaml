name: health_app
description: A comprehensive health and wellness application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  connectivity_plus: ^5.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Authentication
  firebase_auth: ^4.15.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  
  # Charts
  fl_chart: ^0.65.0
  charts_flutter: ^0.12.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  json_annotation: ^4.8.1
  dartz: ^0.10.1
  either_dart: ^1.0.0
  
  # Barcode Scanning
  mobile_scanner: ^3.5.5
  
  # Local Notifications
  flutter_local_notifications: ^16.3.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Health Kit Integration
  health: ^10.0.0
  fitness: ^5.0.0
  
  # Video Calling
  agora_rtc_engine: ^6.3.1
  
  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.6
  
  # Linting
  flutter_lints: ^3.0.1
  effective_dart: ^1.3.2
  
  # Testing
  mockito: ^5.4.3
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/animations/lottie/
    - assets/translations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
